  #   container_name: finance-pro-supabase-db
  #   environment:
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  #   ports:
  #     - "5433:5432"
  #   volumes:
  #     - supabase_data:/var/lib/postgresql/data
  #   networks:
  #     - finance-network

  # supabase-auth:
  #   image: supabase/gotrue:v2.143.0
  #   container_name: finance-pro-supabase-auth
  #   depends_on:
  #     - supabase-db
  #   environment:
  #     GOTRUE_API_HOST: 0.0.0.0
  #     GOTRUE_API_PORT: 9999
  #     API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8000}
  #     GOTRUE_DB_DRIVER: postgres
  #     GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@supabase-db:5432/postgres
  #     GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
  #     GOTRUE_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
  #     GOTRUE_JWT_EXP: 3600
  #   ports:
  #     - "9999:9999"
  #   networks:
  #     - finance-network

  # supabase-rest:
  #   image: postgrest/postgrest:v12.0.1
  #   container_name: finance-pro-supabase-rest
  #   depends_on:
  #     - supabase-db
  #   environment:
  #     PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@supabase-db:5432/postgres
  #     PGRST_DB_SCHEMAS: public
  #     PGRST_DB_ANON_ROLE: anon
  #     PGRST_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
  #   ports:
  #     - "8000:3000"
  #   networks:
  #     - finance-network

  finance-pro:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-pro-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      # Backend Selection (firebase or supabase)
      - VITE_BACKEND=${VITE_BACKEND:-firebase}
      # Firebase Configuration
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
      - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
      - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
      # Supabase Configuration
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-http://localhost:8000}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      # PostgreSQL Direct Configuration
      - VITE_DATABASE_URL=${VITE_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/finance_pro}
    env_file:
      - .env.local
    restart: unless-stopped
    networks:
      - finance-network

  # Optional: Add nginx as a reverse proxy (uncomment if needed)
  # nginx:
  #   image: nginx:alpine
