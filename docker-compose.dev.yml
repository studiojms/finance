version: '3.8'

# Simplified configuration for local development
# Uses only PostgreSQL, the application runs via 'yarn dev'

services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-pro-db-dev
    environment:
      POSTGRES_DB: finance_pro_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Adminer - Web interface for PostgreSQL (optional)
  adminer:
    image: adminer:latest
    container_name: finance-pro-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_dev_data:
